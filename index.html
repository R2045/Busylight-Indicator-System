<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Office Status</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; }
        .btn-status { transition: all 0.2s ease; border: 2px solid #1e293b; }
        
        /* Matching the requested speeds with CSS animations */
        .blink-fast { animation: blink 0.4s infinite; }
        .blink-slow { animation: blink 1.6s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .active-green { border-color: #10b981; background-color: #064e3b; }
        .active-yellow { border-color: #f59e0b; background-color: #78350f; }
        .active-red { border-color: #ef4444; background-color: #7f1d1d; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="max-w-xs w-full space-y-4">
        <h1 class="text-center text-xl font-bold mb-6">Set Availability</h1>

        <button onclick="setStatus('available')" id="available-btn" class="btn-status w-full p-6 rounded-2xl bg-slate-800 flex flex-col items-center">
            <div class="w-4 h-4 bg-green-500 rounded-full mb-2"></div>
            <span class="font-bold text-green-400">AVAILABLE</span>
            <span class="text-xs text-slate-400 font-medium">Solid Green</span>
        </button>

        <button onclick="setStatus('busy-talkable')" id="busy-btn" class="btn-status w-full p-6 rounded-2xl bg-slate-800 flex flex-col items-center">
            <div class="w-4 h-4 bg-yellow-500 rounded-full mb-2 blink-fast"></div>
            <span class="font-bold text-yellow-400">BUSY</span>
            <span class="text-xs text-slate-400 font-medium">Fast Blink Yellow</span>
        </button>

        <button onclick="setStatus('dnd')" id="dnd-btn" class="btn-status w-full p-6 rounded-2xl bg-slate-800 flex flex-col items-center">
            <div class="w-4 h-4 bg-red-500 rounded-full mb-2 blink-slow"></div>
            <span class="font-bold text-red-400">DND</span>
            <span class="text-xs text-slate-400 font-medium">Slow Blink Red</span>
        </button>
    </div>

    <script>
        async function setStatus(status) {
            document.querySelectorAll('.btn-status').forEach(b => b.classList.remove('active-green', 'active-yellow', 'active-red'));
            const map = { 'available': 'active-green', 'busy-talkable': 'active-yellow', 'dnd': 'active-red' };
            document.getElementById(`${status === 'busy-talkable' ? 'busy' : status}-btn`).classList.add(map[status]);

            try {
                await fetch('http://localhost:5000/set_led', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: status })
                });
            } catch (e) { console.error("Server Down"); }
        }
    </script>
</body>
</html>
